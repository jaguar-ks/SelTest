spring.application.name=SelTest
# ###############################################################################
# # LOGGING: Disable all Spring Boot logs during tests
# ###############################################################################
# logging.level.root=OFF

# # Shut down Spring Framework logs
# logging.level.org.springframework=OFF
# logging.level.org.springframework.boot=OFF
# logging.level.org.springframework.test=OFF
# logging.level.org.springframework.context=OFF

# Disable the banner completely
spring.main.banner-mode=off

# ###############################################################################
# # SELENIUM: Silence Selenium internal logs (CDP warnings, etc.)
# ###############################################################################
# logging.level.org.openqa.selenium=ERROR
# logging.level.org.seleniumhq=ERROR

# ###############################################################################
# # SPRING BOOT TEST CONTEXT BOOTSTRAPPER LOGGING
# # (removes lines like "Found @SpringBootConfiguration ...")
# ###############################################################################
# logging.level.org.springframework.boot.test.context=OFF
# logging.level.org.springframework.test.context.support=OFF
# logging.level.org.springframework.test.context=OFF

# ###############################################################################
# # DISABLE BYTEBUDDY & INSTRUMENTATION WARNINGS (via system property)
# ###############################################################################
# jdk.instrument.traceUsage=false
